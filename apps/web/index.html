<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Despesas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container">
        <span class="navbar-brand fw-semibold">Controle de Despesas</span>
        <span class="navbar-text small">SQLite + API + Bootstrap 5</span>
      </div>
    </nav>

    <main class="container py-4">
      <div id="alert-area" class="alert-area"></div>

      <section class="row g-3 mb-4" aria-label="Resumo de despesas">
        <div class="col-12 col-md-4">
          <div class="card summary-card h-100">
            <div class="card-body">
              <p class="text-secondary mb-1">Total gasto</p>
              <strong id="summary-total" class="summary-value">R$ 0,00</strong>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="card summary-card h-100">
            <div class="card-body">
              <p class="text-secondary mb-1">Despesas</p>
              <strong id="summary-expenses" class="summary-value">0</strong>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="card summary-card h-100">
            <div class="card-body">
              <p class="text-secondary mb-1">Categorias</p>
              <strong id="summary-categories" class="summary-value">0</strong>
            </div>
          </div>
        </div>
      </section>

      <div class="row g-4 align-items-start">
        <section class="col-12 col-xl-8">
          <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
            <div>
              <h1 class="h3 mb-1">Despesas</h1>
              <p class="text-secondary mb-0">Registre, filtre e edite seus lancamentos.</p>
            </div>
            <div class="filter-box">
              <label class="form-label mb-1" for="category-filter">Filtrar por categoria</label>
              <select id="category-filter" class="form-select form-select-sm">
                <option value="">Todas</option>
              </select>
            </div>
          </div>

          <form id="expense-form" class="card form-card mb-3">
            <div class="card-body">
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="form-label" for="expense-title">Titulo</label>
                  <input id="expense-title" name="titulo" class="form-control" required>
                </div>
                <div class="col-12 col-md-3">
                  <label class="form-label" for="expense-value">Valor</label>
                  <input id="expense-value" name="valor" class="form-control" type="number" step="0.01" min="0.01" required>
                </div>
                <div class="col-12 col-md-3">
                  <label class="form-label" for="expense-date">Data</label>
                  <input id="expense-date" name="data" class="form-control" type="date" required>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="expense-category">Categoria</label>
                  <select id="expense-category" name="categoriaId" class="form-select" required></select>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="expense-note">Observacao</label>
                  <input id="expense-note" name="observacao" class="form-control">
                </div>
              </div>
            </div>
            <div class="card-footer bg-white d-flex justify-content-end">
              <button class="btn btn-primary" type="submit">Adicionar despesa</button>
            </div>
          </form>

          <div class="card">
            <div class="table-responsive">
              <table class="table align-middle mb-0">
                <thead>
                  <tr>
                    <th>Titulo</th>
                    <th>Categoria</th>
                    <th>Data</th>
                    <th class="text-end">Valor</th>
                    <th class="text-end">Acoes</th>
                  </tr>
                </thead>
                <tbody id="expenses-table"></tbody>
              </table>
            </div>
          </div>
        </section>

        <aside class="col-12 col-xl-4">
          <section>
            <h2 class="h4 mb-3">Categorias</h2>
            <form id="category-form" class="card form-card mb-3">
              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label" for="category-name">Nome</label>
                  <input id="category-name" name="nome" class="form-control" required>
                </div>
                <div>
                  <label class="form-label" for="category-description">Descricao</label>
                  <textarea id="category-description" name="descricao" class="form-control" rows="2"></textarea>
                </div>
              </div>
              <div class="card-footer bg-white d-flex justify-content-end">
                <button class="btn btn-outline-primary" type="submit">Adicionar categoria</button>
              </div>
            </form>

            <div id="category-list" class="list-group"></div>
          </section>
        </aside>
      </div>
    </main>

    <div class="modal fade" id="expense-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <form id="expense-edit-form" class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title h5">Editar despesa</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label" for="edit-expense-title">Titulo</label>
                <input id="edit-expense-title" name="titulo" class="form-control" required>
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label" for="edit-expense-value">Valor</label>
                <input id="edit-expense-value" name="valor" class="form-control" type="number" step="0.01" min="0.01" required>
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label" for="edit-expense-date">Data</label>
                <input id="edit-expense-date" name="data" class="form-control" type="date" required>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="edit-expense-category">Categoria</label>
                <select id="edit-expense-category" name="categoriaId" class="form-select" required></select>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="edit-expense-note">Observacao</label>
                <input id="edit-expense-note" name="observacao" class="form-control">
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal fade" id="category-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <form id="category-edit-form" class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title h5">Editar categoria</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id">
            <div class="mb-3">
              <label class="form-label" for="edit-category-name">Nome</label>
              <input id="edit-category-name" name="nome" class="form-control" required>
            </div>
            <div>
              <label class="form-label" for="edit-category-description">Descricao</label>
              <textarea id="edit-category-description" name="descricao" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/config.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
